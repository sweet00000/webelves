<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookELF</title>
    <script type="module" crossorigin src="/open/notebook/assets/index-BZyBrZFR.js"></script>
    <link rel="stylesheet" crossorigin href="/open/notebook/assets/index-7Fj_snYD.css">
    <style>
/* ── Mobile panel tab-bar ───────────────────────────────── */
#mob-tabbar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
  background: #111315; border-top: 1px solid #252829;
  height: 52px; align-items: stretch;
}
#mob-tabbar button {
  flex: 1; background: none; border: none; border-right: 1px solid #252829;
  color: #9a9890; font-family: system-ui, sans-serif; font-size: 11px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px; padding: 6px 0;
  transition: color .15s; -webkit-tap-highlight-color: transparent;
}
#mob-tabbar button:last-child { border-right: none; }
#mob-tabbar button.mob-active { color: #5fcfb8; background: rgba(95,207,184,.05); }
#mob-tabbar .mob-icon { font-size: 17px; line-height: 1; }
@media (max-width: 700px) {
  #mob-tabbar { display: flex; }
  body { padding-bottom: 52px !important; }
  /* hide drag handles */
  .group.relative.flex-shrink-0.bg-edge { display: none !important; }
}
    </style>
    <script>
(function () {
  if (!window.matchMedia('(max-width: 700px)').matches) return;

  /* Default view = Chat. Pre-set so SolidJS signal reads 0 for Sources width
     and 9999 for Chat width (fills inner container, Studio gets 0). */
  localStorage.setItem('forge.layout.v1.nb.col1', '0');
  localStorage.setItem('forge.layout.v1.nb.col2', '9999');

  var current = 'chat';
  var P = null; /* panel refs: { sources, inner, chat, studio } */

  /* ── style helpers ─────────────────────────── */
  function s(el, show) {
    if (show) {
      el.style.setProperty('display',   'block',  'important');
      el.style.setProperty('width',     '100%',   'important');
      el.style.setProperty('min-width', '0',      'important');
      el.style.setProperty('height',    '100%',   'important');
      el.style.setProperty('overflow',  'hidden', 'important');
      el.style.removeProperty('flex');
    } else {
      el.style.setProperty('display', 'none', 'important');
    }
  }
  function sf(el, show) { /* flex container variant (inner wrapper) */
    if (show) {
      el.style.setProperty('display',   'flex',    'important');
      el.style.setProperty('flex',      '1 1 100%','important');
      el.style.setProperty('width',     '100%',    'important');
      el.style.setProperty('min-width', '0',       'important');
      el.style.setProperty('height',    '100%',    'important');
      el.style.setProperty('overflow',  'hidden',  'important');
    } else {
      el.style.setProperty('display', 'none', 'important');
    }
  }

  /* ── apply active tab ──────────────────────── */
  function applyTab(tab) {
    current = tab;
    if (!P) return;
    if (tab === 'sources') {
      s(P.sources, true);
      sf(P.inner,  false);
    } else {
      s(P.sources, false);
      sf(P.inner,  true);
      s(P.chat,    tab === 'chat');
      s(P.studio,  tab === 'studio');
    }
    document.querySelectorAll('#mob-tabbar button').forEach(function (b) {
      b.classList.toggle('mob-active', b.dataset.tab === tab);
    });
  }

  /* ── find panels via confirmed class structure ─ */
  function findPanels() {
    /* only consider splits that contain a bg-edge handle (confirms it's a ResizableSplit Xe) */
    var splits = Array.from(document.querySelectorAll('.flex.h-full.w-full.overflow-hidden')).filter(function (el) {
      return el.querySelector('.bg-edge') !== null;
    });
    if (splits.length < 2) return null;
    var outer = splits[0];
    var ok = Array.from(outer.children);
    if (ok.length < 3) return null;
    var sources = ok[0]; /* class="overflow-hidden", inline width set by Xe */
    var inner   = ok[2]; /* class="flex-1 overflow-hidden" */
    /* inner split: find within `inner` */
    var innerSplit = splits.find(function (s) { return inner.contains(s); });
    if (!innerSplit) return null;
    var ik = Array.from(innerSplit.children);
    if (ik.length < 3) return null;
    return { sources: sources, inner: inner, chat: ik[0], studio: ik[2] };
  }

  /* ── inject tab bar ────────────────────────── */
  function inject() {
    if (document.getElementById('mob-tabbar')) return;
    var bar = document.createElement('div');
    bar.id = 'mob-tabbar';
    [
      { id: 'sources', label: 'Sources', icon: '📂' },
      { id: 'chat',    label: 'Chat',    icon: '💬' },
      { id: 'studio',  label: 'Studio',  icon: '⚡' },
    ].forEach(function (t) {
      var btn = document.createElement('button');
      btn.dataset.tab = t.id;
      btn.innerHTML = '<span class="mob-icon">' + t.icon + '</span><span>' + t.label + '</span>';
      btn.addEventListener('click', function () { applyTab(t.id); });
      bar.appendChild(btn);
    });
    document.body.appendChild(bar);
    applyTab(current);
  }

  /* ── poll until SolidJS renders panels ─────── */
  var tries = 0;
  function tryInit() {
    var p = findPanels();
    if (p) {
      P = p;
      inject();
    } else if (tries++ < 50) {
      setTimeout(tryInit, 150);
    }
  }
  document.addEventListener('DOMContentLoaded', function () { setTimeout(tryInit, 200); });
})();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
