<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookELF</title>
    <style>
      .notebook-elf-export-btn {
        position: fixed;
        right: 16px;
        top: 14px;
        z-index: 10000;
        border: 1px solid rgba(95,207,184,.45);
        background: #5fcfb8;
        color: #04140f;
        border-radius: 5px;
        padding: 8px 12px;
        font: 700 12px system-ui, -apple-system, "Segoe UI", sans-serif;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
      }
      .notebook-elf-export-overlay {
        position: fixed;
        inset: 0;
        z-index: 10001;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0,0,0,.68);
        backdrop-filter: blur(8px);
      }
      .notebook-elf-export-overlay[hidden] { display: none; }
      .notebook-elf-export-modal {
        width: min(640px, 100%);
        max-height: min(760px, 92vh);
        overflow: auto;
        border: 1px solid #252829;
        background: #0f1113;
        color: #f2f3f2;
        border-radius: 8px;
        padding: 22px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .notebook-elf-export-head {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }
      .notebook-elf-export-kicker {
        color: #5fcfb8;
        font: 700 11px ui-monospace, Consolas, monospace;
        letter-spacing: .14em;
        text-transform: uppercase;
      }
      .notebook-elf-export-head h2 { margin: 6px 0 0; font-size: 24px; letter-spacing: -.03em; }
      .notebook-elf-export-close {
        width: 30px;
        height: 30px;
        border: 1px solid #252829;
        background: #070808;
        color: #a4aaa8;
        border-radius: 4px;
        cursor: pointer;
      }
      .notebook-elf-export-field { display: grid; gap: 7px; margin: 14px 0; }
      .notebook-elf-export-field span,
      .notebook-elf-export-check { color: #a4aaa8; font-size: 13px; }
      .notebook-elf-export-field input,
      .notebook-elf-export-field textarea {
        width: 100%;
        border: 1px solid #252829;
        background: #070808;
        color: #f2f3f2;
        border-radius: 5px;
        padding: 10px 12px;
        font: 13px ui-monospace, Consolas, monospace;
      }
      .notebook-elf-export-field textarea { min-height: 180px; resize: vertical; line-height: 1.55; }
      .notebook-elf-export-check { display: flex; gap: 10px; align-items: flex-start; margin: 12px 0; }
      .notebook-elf-export-check input { margin-top: 3px; accent-color: #5fcfb8; }
      .notebook-elf-export-progress { margin: 18px 0; color: #6b7270; font: 12px ui-monospace, Consolas, monospace; }
      .notebook-elf-export-track { height: 6px; margin-top: 8px; overflow: hidden; border-radius: 999px; background: #252829; }
      .notebook-elf-export-track i { display: block; width: 0; height: 100%; background: #5fcfb8; }
      .notebook-elf-export-actions { display: flex; justify-content: flex-end; }
      .notebook-elf-export-actions button {
        border: 0;
        background: #5fcfb8;
        color: #04140f;
        border-radius: 5px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .notebook-elf-export-actions button:disabled,
      .notebook-elf-export-btn:disabled { opacity: .5; cursor: wait; }
      @media (max-width: 720px) {
        .notebook-elf-export-btn { top: auto; bottom: 14px; right: 14px; }
      }
    </style>
    <script type="module" crossorigin src="/open/notebook/assets/index-BZyBrZFR.js"></script>
    <script type="module" crossorigin src="/shared/notebook-export.js"></script>
    <link rel="stylesheet" crossorigin href="/open/notebook/assets/index-7Fj_snYD.css">
  </head>
